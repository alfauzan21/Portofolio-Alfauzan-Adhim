<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Phantom Wallet Balance Viewer</title>
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <style>
        body {
            font-family: Arial;
            background: #111;
            color: white;
            padding: 20px;
        }
        .btn {
            padding: 10px 18px;
            background: #8b5cf6;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .card {
            background: #1e1e1e;
            padding: 15px;
            margin-top: 20px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<h2>Phantom Wallet Balance Checker</h2>

<button id="connectBtn" class="btn">Connect Phantom</button>

<div id="walletInfo" class="card" style="display:none;">
    <p><b>Address:</b> <span id="address"></span></p>
    <p><b>SOL Balance:</b> <span id="solBalance"></span> SOL</p>

    <h3>Token SPL</h3>
    <div id="tokenList"></div>
</div>

<script>
    const connectBtn = document.getElementById("connectBtn");
    const walletInfo = document.getElementById("walletInfo");
    const solBalanceText = document.getElementById("solBalance");
    const addressText = document.getElementById("address");
    const tokenList = document.getElementById("tokenList");

    let provider = null;

    // Detect Phantom
    function getProvider() {
        if ("solana" in window) {
            const provider = window.solana;
            if (provider.isPhantom) {
                return provider;
            }
        }
        alert("Phantom Wallet tidak ditemukan! Install extension Phantom.");
        return null;
    }

    // Connect Phantom
    connectBtn.onclick = async () => {
        provider = getProvider();
        if (!provider) return;

        const resp = await provider.connect();
        const wallet = resp.publicKey.toString();

        addressText.innerText = wallet;
        walletInfo.style.display = "block";

        getSolBalance(wallet);
        getSplTokens(wallet);
    };

    // Get SOL Balance
    async function getSolBalance(walletAddress) {
        const connection = new solanaWeb3.Connection(
            solanaWeb3.clusterApiUrl("mainnet-beta"),
            "confirmed"
        );

        const publicKey = new solanaWeb3.PublicKey(walletAddress);
        const lamports = await connection.getBalance(publicKey);
        const sol = lamports / solanaWeb3.LAMPORTS_PER_SOL;

        solBalanceText.innerText = sol.toFixed(4);
    }

    // Get SPL Tokens
    async function getSplTokens(walletAddress) {
        const connection = new solanaWeb3.Connection(
            solanaWeb3.clusterApiUrl("mainnet-beta"),
            "confirmed"
        );

        const publicKey = new solanaWeb3.PublicKey(walletAddress);

        const tokenAccounts = await connection.getParsedTokenAccountsByOwner(
            publicKey,
            { programId: solanaWeb3.TOKEN_PROGRAM_ID }
        );

        tokenList.innerHTML = "";

        tokenAccounts.value.forEach((account) => {
            const info = account.account.data.parsed.info;
            const mint = info.mint;
            const amount = info.tokenAmount.uiAmount;

            if (amount > 0) {
                const item = document.createElement("p");
                item.innerHTML = `<b>${mint}</b><br>Balance: ${amount}`;
                tokenList.appendChild(item);
            }
        });
    }
</script>

</body>
</html>
